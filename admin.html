<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>POLMAT | Admin Panel</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; padding: 30px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #252525; border: 1px solid #444; color: white; border-radius: 6px; }
        button { background: #1d4ed8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button.delete { background: #c00; margin-top: 5px; }
        .item-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>POLMAT Yönetim Paneli</h1>
    <div class="admin-grid">
        <div class="card">
            <h3>💰 Fiyat Ayarları</h3>
            <label>Başlangıç Fiyatı (1.599₺ gibi):</label>
            <input type="number" id="basePrice" placeholder="1599">
            <label>İndirim Oranı (%):</label>
            <input type="number" id="discount" placeholder="0">
            <button onclick="updateSettings()">Ayarları Kaydet</button>
        </div>

        <div class="card">
            <h3>🚗 Araç Yönetimi</h3>
            <input type="text" id="carBrand" placeholder="Marka (Örn: TOGG)">
            <input type="text" id="carModel" placeholder="Model (Örn: T10X)">
            <input type="number" step="0.1" id="carPrice" placeholder="Fiyat Katsayısı (Örn: 1.4)">
            <button onclick="addCar()">Araç Ekle</button>
            <div class="item-list" id="carList"></div>
        </div>

        <div class="card">
            <h3>🎨 Paspas Rengi (Görsel Seçimli)</h3>
            <input type="text" id="matName" placeholder="Renk Adı (Örn: TABA)">
            <input type="text" id="matFile" placeholder="Dosya Adı (Örn: taba.png)">
            <button onclick="addMatColor()">Rengi Ekle</button>
            <div class="item-list" id="matList"></div>
        </div>

        <div class="card">
            <h3>🎞️ Kenarlık Görseli Yönetimi</h3>
            <input type="text" id="borderName" placeholder="Kenarlık Adı (Örn: MAVİ)">
            <input type="text" id="borderFile" placeholder="Dosya Adı (Örn: kenar-mavi.png)">
            <button onclick="addBorderColor()">Kenarlığı Ekle</button>
            <div class="item-list" id="borderList"></div>
        </div>
    </div>

    <script>
        // BU KISIMDA FIREBASE VEYA LOCALSTORAGE BAĞLANTISI YAPILIR
        // Örnek Fonksiyon:
        function addBorderColor() {
            const name = document.getElementById('borderName').value;
            const file = document.getElementById('borderFile').value;
            // Veriyi kaydet ve listeyi yenile
            alert(name + " kenarlığı sisteme eklendi. (Görseli images/kenarlik/ içine atmayı unutma!)");
        }
    </script>
</body>
</html>
