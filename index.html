<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>POLMAT AUTO DESIGN | Premium Konfigüratör</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1d4ed8;
            --primary-green: #15a015;
            --bg-dark: #0a0a0a;
            --card-white: #ffffff;
            --accent-red: #c00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 15px; }
        .container { max-width: 1350px; margin: 0 auto; }

        /* HEADER */
        .brand-header { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .brand-header h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .brand-header span { color: var(--accent-red); }

        /* ARAÇ SEÇİMİ */
        .vehicle-nav {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            border: 1px solid #333;
        }

        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-size: 10px; font-weight: 800; color: #888; text-transform: uppercase; }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        select:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ANA PANEL */
        .config-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }

        .preview-box {
            background-color: #f3f4f6;
            border-radius: 15px;
            position: relative;
            min-height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
        }

        .layers { position: relative; width: 500px; height: 500px; }
        .layers img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            transition: all 0.2s ease-in-out;
        }

        #z-base { z-index: 10; }
        #z-border { z-index: 20; }
        #z-heel { z-index: 30; }
        #z-logo { z-index: 40; }

        /* SEÇENEK PANELİ */
        .options-box {
            background-color: var(--card-white);
            border-radius: 15px;
            padding: 20px;
            color: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 850px;
            overflow-y: auto;
        }

        .section-h { font-size: 12px; font-weight: 900; margin-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; color: #444; }
        .section-h::after { content: ''; flex: 1; height: 1px; background: #eee; }

        /* SWATCHLAR */
        .swatch-container { display: grid; gap: 8px; margin-bottom: 20px; }
        #paspas-colors { grid-template-columns: repeat(6, 1fr); }
        #kenar-colors { grid-template-columns: repeat(9, 1fr); } /* 9'lu Kompakt Grid */

        .swatch { cursor: pointer; text-align: center; }
        .swatch input { display: none; }
        .swatch-thumb {
            width: 100%; aspect-ratio: 1;
            border-radius: 6px;
            border: 1px solid #eee;
            background-size: cover;
            background-position: center;
            transition: 0.2s;
        }

        .swatch input:checked + .swatch-thumb { border-color: var(--primary-blue); transform: scale(1.15); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .swatch span { font-size: 7px; font-weight: 700; color: #888; margin-top: 3px; display: block; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* EKLENTİLER */
        .addon-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .addon-row:hover { background: #f9f9f9; }
        .addon-info h4 { font-size: 11px; font-weight: 800; }
        .addon-info p { font-size: 10px; color: #999; }
        .cb { width: 18px; height: 18px; accent-color: var(--primary-blue); cursor: pointer; }

        /* ÖZET VE FİYAT */
        .bottom-bar {
            background: #fff; border-radius: 15px; padding: 20px; margin-top: 20px;
            display: flex; justify-content: space-between; align-items: center; color: #111;
        }
        .total-price { font-size: 28px; font-weight: 900; color: #000; letter-spacing: -1px; }
        .old-p { text-decoration: line-through; color: #aaa; font-size: 14px; margin-right: 8px; }

        .btn-act { display: flex; gap: 10px; }
        .button { padding: 15px 25px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-buy { background: var(--primary-green); color: white; }
        .btn-cart { background: var(--primary-blue); color: white; }
        .button:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 950px) { .config-grid { grid-template-columns: 1fr; } .vehicle-nav { grid-template-columns: 1fr; } }
    </style>
</head>

    function initUI() {
        const pC = document.getElementById('paspas-colors');
        const kC = document.getElementById('kenar-colors');
        const bS = document.getElementById('b-sel');

        matColors.forEach((c, i) => {
            pC.innerHTML += `<label class="swatch"><input type="radio" name="p" value="${c.file}" data-name="${c.name}" ${i===0?'checked':''} onchange="refresh()"><div class="swatch-thumb" style="background-image: url('images/EVA/${c.file}');"></div><span>${c.name}</span></label>`;
        });

        borderColors.forEach((c, i) => {
            kC.innerHTML += `<label class="swatch"><input type="radio" name="k" value="${c.file}" data-name="${c.name}" ${i===0?'checked':''} onchange="refresh()"><div class="swatch-thumb" style="background-color: ${c.hex};"></div><span>${c.name}</span></label>`;
        });

        Object.keys(cars).sort().forEach(b => bS.innerHTML += `<option value="${b}">${b}</option>`);
    }

    function loadModels() {
        const b = document.getElementById('b-sel').value;
        const mS = document.getElementById('m-sel');
        const yS = document.getElementById('y-sel');
        mS.innerHTML = '<option value="">Model Seçin</option>';
        yS.innerHTML = '<option value="">Yıl Seçin</option>';
        if(b && cars[b]) {
            cars[b].forEach((mo, i) => mS.innerHTML += `<option value="${i}">${mo.m}</option>`);
            mS.disabled = false;
        } else { mS.disabled = true; }
        refresh();
    }

    function loadYears() {
        const b = document.getElementById('b-sel').value;
        const mI = document.getElementById('m-sel').value;
        const yS = document.getElementById('y-sel');
        yS.innerHTML = '<option value="">Yıl Seçin</option>';
        if(mI !== "" && cars[b]) {
            const d = cars[b][mI];
            const end = d.e || 2026;
            for(let i = 2026; i >= d.s; i--) { if(i <= end) yS.innerHTML += `<option value="${i}">${i}</option>`; }
            yS.disabled = false;
        } else { yS.disabled = true; }
        refresh();
    }

    function refresh() {
        const pI = document.querySelector('input[name="p"]:checked');
        const kI = document.querySelector('input[name="k"]:checked');
        const h = document.getElementById('cb-heel').checked;
        const l = document.getElementById('cb-logo').checked;

        if(pI) document.getElementById('z-base').src = `images/EVA/${pI.value}`;
        if(kI) document.getElementById('z-border').src = `images/kenarlik/${kI.value}`;
        document.getElementById('z-heel').style.display = h ? 'block' : 'none';
        document.getElementById('z-logo').style.display = l ? 'block' : 'none';

        const b = document.getElementById('b-sel').value;
        const mIdx = document.getElementById('m-sel').value;
        const y = document.getElementById('y-sel').value;
        const mName = (b && mIdx !== "") ? cars[b][mIdx].m : "";
        
        document.getElementById('sum-text').innerText = (b && mName && y) ? `${b} ${mName} (${y})` : "Araç seçimi bekleniyor...";
        document.getElementById('sum-detail').innerText = `${pI.dataset.name} Zemin / ${kI.dataset.name} Kenarlık`;

        document.getElementById('price-tag').innerText = (h ? 1948 : 1599).toLocaleString('tr-TR') + ",00 ₺";
    }

    function clickAddon(id) {
        if(event.target.type !== 'checkbox') {
            document.getElementById(id).checked = !document.getElementById(id).checked;
            refresh();
        }
    }

    initUI();
    refresh();
</script>
